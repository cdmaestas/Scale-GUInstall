name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-packages:
    name: Build packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install build tools
        run: sudo apt-get install -y dpkg-dev rpm

      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"          # strip leading v  (e.g. 0.1.0-beta.1)
          RPM_VER="${TAG//-/.}"               # RPM forbids '-'; replace with '.' (safe, no shell expansion)
          echo "VERSION=$TAG" >> "$GITHUB_ENV"
          # Patch the version into the spec (RPM-safe: hyphens → tildes)
          # Use awk so the replacement value is never interpreted by sed/shell
          awk -v v="Version:        $RPM_VER" '/^Version:/{print v; next} 1' \
            packaging/scale-guinstall.spec > /tmp/_spec && mv /tmp/_spec packaging/scale-guinstall.spec
          # Patch debian control and changelog (Debian allows hyphens in upstream version)
          awk -v v="Version: $TAG" '/^Version:/{print v; next} 1' \
            packaging/debian/control > /tmp/_ctrl && mv /tmp/_ctrl packaging/debian/control
          # Update changelog date/version
          awk -v v="scale-guinstall ($TAG-1) unstable; urgency=low" \
            'NR==1{print v; next} 1' \
            packaging/debian/changelog > /tmp/_cl && mv /tmp/_cl packaging/debian/changelog
          # Patch build-pkg.sh VERSION variable (preserve executable bit)
          awk -v v="VERSION=\"$RPM_VER\"" '/^VERSION=/{print v; next} 1' \
            packaging/build-pkg.sh > /tmp/_bpkg && chmod +x /tmp/_bpkg && mv /tmp/_bpkg packaging/build-pkg.sh

      - name: Build RPM and DEB
        run: ./packaging/build-pkg.sh

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG 2>/dev/null \
            | grep "^sec" | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          # Configure rpmmacros so rpmsign knows which key to use
          cat > ~/.rpmmacros << RPMMACROS
          %_gpg_name $KEY_ID
          %_gpg_path $HOME/.gnupg
          %__gpg /usr/bin/gpg
          RPMMACROS

      - name: Sign RPM
        run: |
          sudo apt-get install -y rpm-common
          for rpm in dist/*.rpm; do
            echo "${{ secrets.GPG_PASSPHRASE }}" | \
              rpmsign --addsign --passphrase-fd 0 "$rpm"
            echo "Signed: $rpm"
          done

      - name: Verify RPM signature
        run: |
          gpg --armor --export "$GPG_KEY_ID" | sudo tee /etc/apt/trusted.gpg.d/scale-guinstall.asc > /dev/null
          rpm --import packaging/RPM-GPG-KEY-scale-guinstall
          for rpm in dist/*.rpm; do
            rpm --checksig "$rpm" && echo "OK: $rpm signature valid"
          done

      - name: List artifacts
        run: ls -lh dist/

      - name: Build release body
        run: python3 .github/scripts/build_release_body.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          name: "Scale GUInstall ${{ env.VERSION }}"
          body_path: /tmp/release_body.md
          files: |
            dist/*.rpm
            dist/*.deb
            Scale-GUInstall.html
            packaging/RPM-GPG-KEY-scale-guinstall
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
